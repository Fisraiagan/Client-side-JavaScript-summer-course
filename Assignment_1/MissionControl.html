<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mission Control</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/MissionControl.js" defer></script>
</head>
<body>

    <h1>Mission Control Interface</h1>

    <div class="controls">
        <button id="agentBtn">Select Agent Type</button>
        <p id='agentTypeOutput'></p>
 
        <button id="locationBtn">Select Mission Location</button>
        <p id='locationOutput'></p>
 
        <button id="weaponLoadoutBtn">Select Weapon Loadout</button>
        <p id='weaponLoadoutOutput'></p>
 
        <button id="objectiveBtn">Select Mission Objective</button>
        <p id='objectiveOutput'></p>
 
        <button id="riskBtn">Select Risk Level</button>
        <p id='riskLevelOutput'></p>

        <button id="generateBtn">Generate Mission Briefing</button>
        <button id="resetBtn">Reset Mission</button>
    </div>

    <h2>Mission Briefing</h2>
    <p id="missionOutput"></p>

</body>
</html>
